name: 收盘复盘推送

on:
  schedule:
    # 北京时间 15:30 = UTC 07:30（周一至周五）
    - cron: "30 7 * * 1-5"
  workflow_dispatch:  # 手动触发

jobs:
  push-review:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 运行收盘复盘
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          FEISHU_SECRET: ${{ secrets.FEISHU_SECRET }}
        run: python closing_review.py

      - name: 上传 HTML 长图
        uses: actions/upload-artifact@v4
        with:
          name: closing-review-html
          path: /tmp/closing_review.html
          retention-days: 7
